name: bubbly-train-env
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # Core scientific stack
  - numpy
  - pandas
  - scipy
  - scikit-image
  - tqdm
  # Computer Vision
  - opencv
  # MicroSAM & its dependencies (elf, nifty, torch-em are dependencies of micro_sam on conda-forge)
  - micro_sam
  # PyTorch Stack (with CUDA support)
  # Channel-pinned to pytorch channel to guarantee CUDA builds (not the CPU-only conda-forge builds)
  - pytorch::pytorch
  - pytorch::torchvision
  - pytorch::torchaudio
  - pytorch::pytorch-cuda=11.8
  # Pip fallbacks if needed
  - pip:
    - natsort
    - tifffile
    # StarDist (train_stardist.py)
    - stardist
    - tensorflow
    - csbdeep
    - gputools
    # YOLOv9 (train_yolov9.py)
    - ultralytics
